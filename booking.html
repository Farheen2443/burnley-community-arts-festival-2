    <section class="booking">

        <h1 class="booking-title">Book an Event</h1>
        <p class="booking-text">
            Please complete the form below to book your place at one of our upcoming events.
        </p>

        <form class="booking-form">

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Your email address" required>

            <label for="event">Select Event</label>
            <select id="event" required>
                <option value="">Choose an event</option>
                <option>Community Art Workshop</option>
                <option>Evening Art Showcase</option>
                <option>Live Music & Open Mic Night</option>
            </select>

            <label for="message">Additional Information</label>
            <textarea id="message" rows="4" placeholder="Any special requirements or questions"></textarea>

            <button type="submit" class="submit-btn">Submit Booking</button>

        </form>

    </section>
